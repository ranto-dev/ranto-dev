name: Auto-update README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update README
        run: |
          echo "Dernière mise à jour : $(date)" > README.md

      - name: Commit changes
        run: |
          git config --global user.name "ranto-dev"
          git config --global user.email "rantoandrianandraina@gmail.com"
          git add README.md
          git commit -m "Update README - $(date)" || echo "No changes to commit"
          git push
